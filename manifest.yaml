id: kindle-md-reader
version: 0.1.0
release-notes: "Initial wrapper"
title: Kindle Markdown Reader
description: Servidor ligero para leer Markdown desde un vault en StartOS (UI minimal para Kindle).
license: MIT
wraps: {}  # standalone

assets:
  icon: icon.png
  license: LICENSE
  instructions: instructions.md

dependencies: { }

interfaces:
  main:
    name: Web UI
    description: Kindle Markdown Reader
    protocol: http
    port: 3000
    ui: true

volumes:
  data:
    type: data
    description: Vault Markdown

mounts:
  data:
    volume: data
    path: /vault

config: 
  type: object
  required: [authUser, authPass, vaultPath]
  properties:
    authUser:
      type: string
      title: Usuario
      default: kindle
    authPass:
      type: string
      title: Contraseña
      default: changeme
      writeOnly: true
    vaultPath:
      type: string
      title: Ruta del vault
      default: /vault
health-checks:
  main:
    name: Web check
    type: http
    path: /health
    interval: 30s
    timeout: 10s
    initial-delay: 5s

id: kindle-md-reader
version: 0.1.1
release-notes: "Fix missing docker_entrypoint.sh in container image"
title: Kindle Markdown Reader
description:
  short: "Lector ligero de Markdown para vaults en StartOS."
  long: |
    Kindle Markdown Reader expone una interfaz web minimalista para leer
    archivos Markdown almacenados en un vault montado por StartOS.

    El servicio está pensado para usar el volumen `data` en `/vault` y
    navegar documentos `.md` desde un navegador simple como el del Kindle.
license: MIT
wrapper-repo: "https://github.com/rocket-morgan/kindle-md-reader-startos"
upstream-repo: "https://github.com/rocket-morgan/kindle-md-reader"
wraps: {}  # standalone

assets:
  icon: icon.png
  license: LICENSE
  instructions: instructions.md

main:
  type: docker
  image: main
  entrypoint: docker_entrypoint.sh
  args: []
  mounts:
    data: /vault
  gpu-acceleration: false

hardware-requirements:
  arch:
    - x86_64
    - aarch64

dependencies: {}

interfaces:
  main:
    name: Web UI
    description: Kindle Markdown Reader
    tor-config:
      port-mapping:
        80: "3000"
    lan-config:
      443:
        ssl: true
        internal: 3000
    ui: true
    protocols:
      - tcp
      - http

volumes:
  data:
    type: data

config:
  get:
    type: script
  set:
    type: script

properties:
  type: script

health-checks:
  main:
    name: Web check
    success-message: Kindle Markdown Reader is accessible
    type: script

backup:
  create:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - create
      - /mnt/backup
      - /vault
    mounts:
      BACKUP: /mnt/backup
      data: /vault
    io-format: yaml
  restore:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - restore
      - /mnt/backup
      - /vault
    mounts:
      BACKUP: /mnt/backup
      data: /vault
    io-format: yaml
